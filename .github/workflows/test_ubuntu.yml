name: Test with Ubuntu, Mamba

on:
  push:
    branches:
      - main
      - master
      - devel

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      max-parallel: 5
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    defaults:
      run:
        shell: bash -l {0}
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python from Miniconda/mamba
      uses: conda-incubator/setup-miniconda@v3
      with:
        miniconda-version: latest
        mamba-version: "*"
        channels: conda-forge,defaults
        channel-priority: true
        activate-environment: anaconda-client-env
        python-version: ${{ matrix.python-version }}
        use-mamba: true
        use-cache: true

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-

    - name: Install mamba dependencies
      run: |
        printenv
        mamba install -y -c conda-forge python=${{ matrix.python-version }} "numpy>=1.23" "scipy>=1.8" "matplotlib>=3.6" "h5py>=3.5" "wxpython>=4.1" scikit-image scikit-learn pycifrw pandas jupyter plotly pyparsing pytest pytest-cov coverage
    - name: Install xraylarch and other dependencies with pip
      run: |
        pip install lmfit peakutils pyepics pyshortcuts termcolor sphinx dill pycifrw xraydb wxmplot wxutils fabio silx imageio charset-normalizer
        pip install xraylarch

    - name: install NEO
      run: |
        pip install .
    - name: Run Solvers tests
      run: |
        python -m unittest discover -s Solvers/tests -t . -v
    - name: Run EXAFS tests
      # cwd must be the EXAFS module (test data paths are relative to it);
      # -t points discovery back at the repo root for imports
      working-directory: PhysicsModules/EXAFS
      run: |
        python -m unittest discover -s tests -t ../.. -v
    - name: Run NanoIndentation tests
      run: |
        python -m unittest discover -s PhysicsModules/NanoIndentation/tests -t . -v
    - name: Run XPS tests
      # pytest, not unittest — see PhysicsModules/XPS/README.md. Golden
      # tests are bit-exact only in the pinned constraints.txt environment,
      # so only the fast (non-golden) suite runs in CI's default env.
      working-directory: PhysicsModules/XPS
      run: |
        pytest -m "not golden" -q
